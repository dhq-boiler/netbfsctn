name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/Netbfsctn.Cli/Netbfsctn.Cli.csproj

      - name: Build
        run: dotnet build src/Netbfsctn.Cli/Netbfsctn.Cli.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Netbfsctn.Tests/Netbfsctn.Tests.csproj -c Release --no-build --filter "FullyQualifiedName!~CppCliObfuscationTests"

      - name: Publish (win-x64)
        run: dotnet publish src/Netbfsctn.Cli/Netbfsctn.Cli.csproj -c Release -r win-x64 --self-contained -o publish/win-x64

      - name: Publish (linux-x64)
        run: dotnet publish src/Netbfsctn.Cli/Netbfsctn.Cli.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64

      - name: Package (win-x64)
        run: |
          cd publish/win-x64
          zip -r ../../netbfsctn-${{ steps.version.outputs.VERSION }}-win-x64.zip .

      - name: Package (linux-x64)
        run: |
          cd publish/linux-x64
          zip -r ../../netbfsctn-${{ steps.version.outputs.VERSION }}-linux-x64.zip .

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            netbfsctn-${{ steps.version.outputs.VERSION }}-win-x64.zip \
            netbfsctn-${{ steps.version.outputs.VERSION }}-linux-x64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
